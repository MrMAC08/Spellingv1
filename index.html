<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weekly Vocabulary Station</title>
    <style>
        :root {
            --primary: #4a90e2;
            --success: #2ec4b6;
            --danger: #e71d36;
            --bg: #f8f9fa;
            --card-bg: #ffffff;
            --text: #2b2d42;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            width: 100%;
            max-width: 800px;
        }

        .teacher-panel {
            background: #e9ecef;
            border: 2px dashed #6c757d;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 30px;
        }

        .teacher-panel h2 { margin-top: 0; color: #495057; }

        .bulk-textarea {
            width: 100%;
            height: 150px;
            padding: 10px;
            border: 1px solid #ced4da;
            border-radius: 6px;
            font-family: monospace;
            font-size: 13px;
            box-sizing: border-box;
            margin-bottom: 15px;
            resize: vertical;
        }

        .student-card {
            background: var(--card-bg);
            border-radius: 16px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.05);
            padding: 40px;
            text-align: center;
            min-height: 400px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        .menu-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
            gap: 15px;
            width: 100%;
            max-width: 500px;
            margin-top: 20px;
        }

        .menu-btn {
            background-color: #f1f5f9;
            color: var(--text);
            border: 2px solid #cbd5e1;
            padding: 15px;
            font-size: 1.1rem;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
            margin-top: 0;
            transition: all 0.2s;
        }
        .menu-btn:hover {
            background-color: var(--primary);
            color: white;
            border-color: var(--primary);
        }

        .progress-bar { font-weight: bold; color: var(--primary); margin-bottom: 20px; font-size: 1.1rem; }
        .target-word { font-size: 5rem; font-weight: 800; letter-spacing: 2px; margin: 10px 0; color: var(--text); transition: opacity 0.5s ease; }
        .hidden-word { opacity: 0 !important; }
        
        .rule-box {
            background: #f1f5f9;
            border-left: 5px solid var(--primary);
            padding: 15px;
            border-radius: 0 8px 8px 0;
            font-size: 1.2rem;
            margin: 20px 0;
            max-width: 90%;
            text-align: left;
        }

        .lock-container {
            background: #fff0f1;
            border: 2px dashed var(--danger);
            border-radius: 8px;
            padding: 15px;
            margin-top: 20px;
            width: 90%;
            max-width: 400px;
        }

        .teacher-password-input, .student-input {
            font-size: 1.5rem;
            padding: 12px;
            text-align: center;
            border: 3px solid #cbd5e1;
            border-radius: 8px;
            outline: none;
        }
        .teacher-password-input { width: 220px; font-size: 1.2rem; padding: 8px; text-transform: lowercase;}
        .student-input { width: 80%; max-width: 300px; text-transform: lowercase; }

        button {
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 12px 28px;
            font-size: 1.1rem;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            margin-top: 20px;
        }
        button:hover { background-color: #357abd; }
        .sentence-prompt { font-size: 1.7rem; margin-bottom: 25px; line-height: 1.6; }
        .feedback { font-size: 1.2rem; font-weight: bold; margin-top: 15px; }
        .feedback.success { color: var(--success); }
        .feedback.error { color: var(--danger); }
        .toggle-panel-btn { background: #6c757d; margin-bottom: 10px; padding: 8px 16px; font-size: 0.9rem; }
    </style>
</head>
<body>

<div class="container">
    <button class="toggle-panel-btn" onclick="toggleTeacherPanel()">Open Teacher Control Panel</button>
    
    <div class="teacher-panel" id="teacherPanel">
        <h2>Teacher Setup Control Panel</h2>
        
        <div style="margin-bottom: 15px;">
            <label style="font-weight:bold;">First Word Master Code: </label>
            <input type="text" id="teacherCodeSetting" value="sunny" style="padding:5px; font-size:1rem; width:120px;">
        </div>

        <div style="margin-bottom: 15px;">
            <label style="font-weight:bold; display:block; margin-bottom:5px;">Bulk Paste Master Word List (Will Auto-Split into Lessons of 5)</label>
            <textarea id="bulkPasteInput" class="bulk-textarea" placeholder="Paste your entire comma-separated list block here..."></textarea>
            <button onclick="processBulkPaste()" style="margin-top:0; padding:10px 20px; font-size:1rem; background-color:var(--success); width:100%;">Process and Apply Master List</button>
        </div>
    </div>

    <div class="student-card" id="gameCard">
        </div>
</div>

<script>
    const formViewURL = "https://docs.google.com/forms/d/e/1FAIpQLSddB0NQFaIBv9x-feJucH_YGDwHb8suDI9h1ShPOv1yGzCCXQ/viewform";
    const nameKey = "entry.421008981";
    const wordsKey = "entry.1429911539";
    const incorrectKey = "entry.407995943";
    const scoreKey = "entry.211442136";

    // Global collection parsed from bulk block
    let masterCurriculum = [
        { word: "said", rule: "The letters 's' and 'd' play fair. 'ai' makes a short /e/ sound.", sentence: "She ___ hello to me this morning." },
        { word: "they", rule: "The 'th' plays fair. 'ey' makes a long /a/ sound.", sentence: "___ are going to play at the playground." },
        { word: "from", rule: "The 'fr' and 'm' sound normal. 'o' makes a short /u/ sound.", sentence: "This homemade card is ___ my best friend." },
        { word: "where", rule: "The 'wh' sounds normal. 'ere' makes an /air/ sound.", sentence: "___ did you leave your school backpack?" },
        { word: "what", rule: "The 'wh' and 't' sound normal. 'a' makes a short /u/ or /o/ sound.", sentence: "___ is your absolute favorite flavor of ice cream?" }
    ];

    // Active subset loaded for current session
    let activeLessonWords = [];
    let currentWordIndex = 0;
    let currentStep = 0; 
    let masterTeacherCode = "sunny";
    let activeLessonLabel = "";
    
    let studentName = "";
    let correctWordsList = [];
    let incorrectWordsList = [];
    let correctCount = 0;

    function processBulkPaste() {
        const rawText = document.getElementById('bulkPasteInput').value.trim();
        if(!rawText) return alert("Please paste data into the bulk box first!");
        
        const lines = rawText.split('\n').map(line => line.trim()).filter(line => line.length > 0);
        let parsedList = [];

        lines.forEach(line => {
            const parts = line.split(',');
            const word = parts[0] ? parts[0].trim().toLowerCase() : "";
            const rule = parts[1] ? parts[1].trim() : "";
            const sentence = parts.slice(2).join(',') ? parts.slice(2).join(',').trim() : "Fill in the blank: ___";

            if (word) {
                parsedList.push({ word, rule, sentence });
            }
        });

        if (parsedList.length === 0) return alert("Could not find valid comma formats.");
        
        masterCurriculum = parsedList;
        masterTeacherCode = document.getElementById('teacherCodeSetting').value.trim().toLowerCase();
        
        document.getElementById('bulkPasteInput').value = "";
        toggleTeacherPanel();
        
        // Reset state and head back out to name screen
        studentName = "";
        currentStep = 0;
        renderStep();
        alert(`Loaded ${masterCurriculum.length} words! Formatted dynamically into lessons.`);
    }

    function toggleTeacherPanel() {
        const panel = document.getElementById('teacherPanel');
        panel.style.display = panel.style.display === 'none' ? 'block' : 'none';
    }

    function getRequiredPassword() {
        if (currentWordIndex === 0) return masterTeacherCode;
        return activeLessonWords[currentWordIndex - 1].word; 
    }

    function renderStep() {
        const card = document.getElementById('gameCard');
        
        // Step 0: Identify Name
        if (currentStep === 0) {
            card.innerHTML = `
                <h2>Welcome to Word Practice Station</h2>
                <p style="font-size: 1.2rem;">Please enter your name to start your lesson:</p>
                <input type="text" id="nameInput" class="student-input" style="text-transform: none;" placeholder="Your Name...">
                <br><button onclick="submitName()">Continue</button>
            `;
            document.getElementById('nameInput').focus();
            return;
        }

        // Step 0.5: Lesson Selection Menu Dashboard
        if (currentStep === 0.5) {
            let menuButtonsHTML = "";
            const lessonsCount = Math.ceil(masterCurriculum.length / 5);

            for (let i = 0; i < lessonsCount; i++) {
                const rangeStart = (i * 5) + 1;
                let rangeEnd = (i * 5) + 5;
                if (rangeEnd > masterCurriculum.length) rangeEnd = masterCurriculum.length;

                menuButtonsHTML += `<button class="menu-btn" onclick="launchLesson(${i})">Lesson ${i + 1}<br><span style="font-size:0.8rem; font-weight:normal; color:#64748b;">Words ${rangeStart}-${rangeEnd}</span></button>`;
            }

            card.innerHTML = `
                <h2>Hello, ${studentName}!</h2>
                <p style="font-size: 1.2rem; margin-bottom:10px;">Select which vocabulary track you want to run today:</p>
                <div class="menu-grid">${menuButtonsHTML}</div>
            `;
            return;
        }

        const currentData = activeLessonWords[currentWordIndex];
        let progressHTML = `<div class="progress-bar">${activeLessonLabel} - Word ${currentWordIndex + 1} of ${activeLessonWords.length}</div>`;

        // Step 1: Study screen
        if (currentStep === 1) {
            let ruleHTML = currentData.rule.trim() !== "" ? `<div class="rule-box"><strong>Spelling Strategy:</strong> ${currentData.rule}</div>` : `<p style="font-size:1.2rem; color:#64748b;">Study this word closely!</p>`;
            card.innerHTML = `
                ${progressHTML}
                <div class="target-word">${currentData.word}</div>
                ${ruleHTML}
                <button onclick="nextStep()">I Studied It</button>
            `;
        } 
        // Step 2: Paper Notebook & Password Prompt
        else if (currentStep === 2) {
            let passwordHint = currentWordIndex === 0 ? "Teacher entry code required." : `Type the previous word you just spelled!`;
            let checklistItems = "";
            if (currentData.rule.trim() !== "") {
                checklistItems += `<li>Write the spelling tip/rule in your book:<br><em style="color:#64748b; font-size:1.1rem;">"${currentData.rule}"</em></li>`;
            }
            checklistItems += `<li>Write the word <strong style="color:var(--primary);">${currentData.word}</strong> on your paper <strong>5 times</strong>.</li>`;

            card.innerHTML = `
                ${progressHTML}
                <div style="font-size: 1.4rem; font-weight: bold; color: #e71d36;">Notebook Practice Time</div>
                <ol style="text-align: left; margin: 20px auto; max-width: 85%; font-size: 1.2rem; line-height: 1.6;">
                    ${checklistItems}
                </ol>
                <div class="lock-container" style="margin: 0 auto;">
                    <label style="font-weight: bold; display:block; margin-bottom:5px;">Progress Unlock Zone</label>
                    <span style="font-size:0.9rem; color:#64748b; display:block; margin-bottom:10px;">${passwordHint}</span>
                    <input type="text" id="passInput" class="teacher-password-input" placeholder="Enter word code..." autocomplete="off">
                    <br><button onclick="verifyTeacherCode()" style="margin-top:10px; padding: 8px 20px; font-size: 0.95rem; background-color: var(--danger);">Unlock Next Step</button>
                    <div id="lockFeedback" class="feedback"></div>
                </div>
            `;
            document.getElementById('passInput').focus();
        } 
        // Step 3: Flash Fading Screen
        else if (currentStep === 3) {
            card.innerHTML = `
                ${progressHTML}
                <p style="font-size:1.3rem;">Look closely before it disappears...</p>
                <div class="target-word" id="fadingWord">${currentData.word}</div>
            `;
            setTimeout(() => {
                const el = document.getElementById('fadingWord');
                if(el) el.classList.add('hidden-word');
                setTimeout(() => { nextStep(); }, 800);
            }, 1500);
        } 
        // Step 4: Sentenced Test Input
        else if (currentStep === 4) {
            card.innerHTML = `
                ${progressHTML}
                <div class="sentence-prompt">${currentData.sentence}</div>
                <div class="input-area">
                    <input type="text" id="testInput" class="student-input" placeholder="Spell the word here" autocomplete="off">
                </div>
                <button onclick="checkTestAnswer()">Check Answer</button>
                <div id="testFeedback" class="feedback"></div>
            `;
            document.getElementById('testInput').focus();
        }
    }

    function submitName() {
        const val = document.getElementById('nameInput').value.trim();
        if(val) {
            studentName = val;
            currentStep = 0.5; // Send out to selector dashboard
            renderStep();
        }
    }

    function launchLesson(index) {
        const sliceStart = index * 5;
        activeLessonWords = masterCurriculum.slice(sliceStart, sliceStart + 5);
        activeLessonLabel = `Lesson ${index + 1}`;
        
        currentWordIndex = 0;
        correctWordsList = [];
        incorrectWordsList = [];
        correctCount = 0;
        
        currentStep = 1; // Head direct into word 1 study card
        renderStep();
    }

    function nextStep() { currentStep++; renderStep(); }

    function verifyTeacherCode() {
        const input = document.getElementById('passInput').value.trim().toLowerCase();
        if(input === getRequiredPassword()) { nextStep(); } 
        else {
            const feedback = document.getElementById('lockFeedback');
            feedback.className = "feedback error";
            feedback.innerHTML = "Wrong code!";
            document.getElementById('passInput').value = '';
        }
    }

    function checkTestAnswer() {
        const entered = document.getElementById('testInput').value.trim().toLowerCase();
        const correct = activeLessonWords[currentWordIndex].word;
        
        let isCorrect = (entered === correct);
        if(isCorrect) {
            correctCount++;
            correctWordsList.push(correct);
        } else {
            let attempt = entered === "" ? "[Left Blank]" : entered;
            incorrectWordsList.push(`${attempt} (Target Word: ${correct})`);
        }
        
        const feedback = document.getElementById('testFeedback');
        if (isCorrect) {
            feedback.className = "feedback success";
            feedback.innerHTML = "Excellent! You got it!";
        } else {
            feedback.className = "feedback error";
            feedback.innerHTML = `Oops! The correct spelling was "${correct}".`;
        }

        setTimeout(() => {
            if (currentWordIndex < activeLessonWords.length - 1) {
                currentWordIndex++;
                currentStep = 1;
                renderStep();
            } else {
                showEndScreen();
            }
        }, 2000);
    }

    function showEndScreen() {
        const card = document.getElementById('gameCard');
        let finalScore = `${correctCount} out of ${activeLessonWords.length}`;

        card.innerHTML = `
            <h1 style="color: var(--success); font-size: 3rem;">Lesson Complete</h1>
            <p style="font-size:1.3rem;">Great work, <strong>${studentName}</strong> on <strong>${activeLessonLabel}</strong>!</p>
            <p style="font-size:1.2rem; background:#f1f5f9; padding:10px; border-radius:8px;">Your Score: <strong>${finalScore}</strong></p>
            
            <div id="submissionZone">
                <p style="color:#64748b;">Click the button below to open your Google Form entry and click Submit:</p>
                <button onclick="openGoogleFormLink()" style="background-color: var(--success); font-size:1.3rem; padding:15px 35px;">Open Google Form</button>
            </div>
        `;
    }

    function openGoogleFormLink() {
        let correctReport = correctWordsList.join(', ') || "None";
        let incorrectReport = incorrectWordsList.join(', ') || "None";
        let finalScore = `${correctCount} out of ${activeLessonWords.length}`;

        let filledURL = `${formViewURL}?usp=pp_url&${nameKey}=${encodeURIComponent(studentName)}&${wordsKey}=${encodeURIComponent(correctReport)}&${incorrectKey}=${encodeURIComponent(incorrectReport)}&${scoreKey}=${encodeURIComponent(finalScore)}`;
        
        window.open(filledURL, '_blank');

        document.getElementById('submissionZone').innerHTML = `<p style="color: var(--success); font-weight:bold; font-size:1.2rem;">Form opened in a new window! Make sure to click Submit on that page.</p>`;
        setTimeout(() => { showPostSubmitOptions(); }, 1500);
    }

    function showPostSubmitOptions() {
        const card = document.getElementById('gameCard');
        card.innerHTML += `
            <hr style="width:80%; margin:20px 0; border:1px solid #e2e8f0;">
            <p>What would you like to do next?</p>
            <button onclick="currentStep=0.5; renderStep();" style="background-color:#6c757d; margin-right:10px;">Return to Lesson Menu</button>
            <button onclick="studentName=''; currentStep=0; renderStep();" style="background-color:var(--primary);">Log Out / New Student</button>
        `;
    }

    document.getElementById('teacherPanel').style.display = 'none';
    renderStep();
</script>

</body>
</html>
